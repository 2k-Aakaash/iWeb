<!DOCTYPE html>
<html>
<head>
  <title>iWeb</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest-pwa.json" />

    <link rel="icon" href="https://ik.imagekit.io/026k2i7ys/iWeb%20Favicon.svg?updatedAt=1700227200100" type="image/svg+xml">

    <!--CDN Script tag-->
    <script src="js/vibrant.js"></script>

    <!--Link Elements of Stylesheets-->
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/fonts.css">
    
</head>

<body>

  <!--
  <div class="date-day-container">
    <p><span id="currentDay"></span> <span id="currentDate"></span></p>
  </div>
  -->

  <!-- Apple-Style Dynamic Island Music Player -->
  <div class="dynamic-island-container" id="dynamic-island">
    <div class="dynamic-island-pill" id="island-pill">
      <!-- 1. Collapsed State Content -->
      <div class="island-collapsed-content">
        <img class="island-art" id="island-collapsed-art" src="https://ik.imagekit.io/026k2i7ys/iWeb%20Favicon.svg?updatedAt=1700227200100" alt="Artwork" title="Click to open Library">
        <span class="island-elapsed-time" id="island-collapsed-elapsed">0:00</span>
        <div class="island-waveform" id="island-collapsed-waveform">
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
        </div>
      </div>

      <!-- 2. Hovered State Content -->
      <div class="island-hovered-content">
        <img class="island-art" id="island-hovered-art" src="https://ik.imagekit.io/026k2i7ys/iWeb%20Favicon.svg?updatedAt=1700227200100" alt="Artwork" title="Click to open Library">
        <div class="island-info">
          <span class="island-title" id="island-hovered-title">No Track Selected</span>
          <span class="island-artist" id="island-hovered-artist">Select a folder to start</span>
        </div>
        <div class="island-waveform" id="island-hovered-waveform">
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
        </div>
      </div>

      <!-- 3. Clicked/Expanded State Content -->
      <div class="island-expanded-content">
        <div class="expanded-top-row">
          <img class="island-art-large" id="island-expanded-art" src="https://ik.imagekit.io/026k2i7ys/iWeb%20Favicon.svg?updatedAt=1700227200100" alt="Artwork" title="Click to open Library">
          <div class="expanded-info">
            <span class="expanded-title" id="island-expanded-title">No Track Selected</span>
            <span class="expanded-artist" id="island-expanded-artist">Select a folder to start</span>
          </div>
          <div class="expanded-waveform" id="island-expanded-waveform">
            <span class="wave-bar"></span>
            <span class="wave-bar"></span>
            <span class="wave-bar"></span>
            <span class="wave-bar"></span>
            <span class="wave-bar"></span>
          </div>
        </div>
        <div class="expanded-progress-row">
          <span class="expanded-time-elapsed" id="island-expanded-elapsed">0:00</span>
          <div class="slider-wrapper">
            <input type="range" class="expanded-slider" id="island-expanded-progress" min="0" max="100" value="0" step="0.1">
          </div>
          <span class="expanded-time-remaining" id="island-expanded-remaining">0:00</span>
        </div>
        <div class="expanded-controls-row">
          <!-- Spacer to balance the AirPlay button on the right -->
          <div class="controls-spacer"></div>
          
          <div class="controls-center">
            <button class="expanded-control-btn btn-prev" id="island-expanded-prev" title="Previous">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 18V6l-8.5 6 8.5 6zm8.5 0V6L12 12l8.5 6z"/></svg>
            </button>
            <button class="expanded-control-btn btn-play" id="island-expanded-play" title="Play/Pause">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="expanded-control-btn btn-next" id="island-expanded-next" title="Next">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 6v12l8.5-6L12 6zM3.5 6v12L12 12 3.5 6z"/></svg>
            </button>
          </div>
          
          <button class="expanded-control-btn btn-output" id="island-expanded-output" title="Output Audio Source">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17l-5 5h10l-5-5z" /><path d="M12 2C7.03 2 3 6.03 3 11c0 1.66.45 3.22 1.24 4.57l1.47-1.47C5.23 13.16 5 12.11 5 11c0-3.87 3.13-7 7-7s7 3.13 7 7c0 1.11-.23 2.16-.71 3.1l1.47 1.47C20.55 14.22 21 12.66 21 11c0-4.97-4.03-9-9-9z" opacity="0.8" /><path d="M12 6c-2.76 0-5 2.24-5 5 0 .93.26 1.8.71 2.54l1.47-1.47c-.28-.48-.38-.96-.38-1.07 0-1.82 1.48-3.3 3.3-3.3s3.3 1.48 3.3 3.3c0 .35-.08.69-.18 1.07l1.47 1.47c.45-.74.71-1.61.71-2.54 0-2.76-2.24-5-5-5z" opacity="0.8" /></svg>
          </button>
        </div>
      </div>
    </div>
  </div>


<div class="container">
  <div class="time-container">
    <div class="center">
      <span id="clock" class="clock-time"></span>
      <!-- style="text-shadow: 1px 1.5px rgba(0, 0, 0, 0.434);" -->
      <p class="name-intro type-animation animating"><span id="quote"></span><span id="custom-name"></span>!</p>
      <!-- <button id="change-quote-button">Change Quote</button> -->
    </div>

    <div class="favorite-links-container">
      <div class="favorite-links-bar" id="favorite-links-bar"></div>
    </div>
  
    <div class="search-container">
        <label class="search-bar-text" id="search-label"></label>
        <!-- <button id="change-search-button">Change Manually</button> -->
        <form id="search-form">
          <input type="text" id="search-input" autocomplete="on" autofocus="on">
        </form>
  </div>
</div>
</div>

<div class="links-container">
<button id="linksButton" class="link-button">Links</button>
<button class="change-bg">Change BG</button>

<div id="box" class="box">

  <div class="bookmark-input-container">
    <input type="text" id="bookmark-input" class="link-input" placeholder="Enter URL">
    <button id="addBookmarkButton" class="add-bookmark">+</button>
  </div>
  
  <div class="links-text-container">
    <div id="context-menu" class="context-menu"></div>
  </div>
  <button id="drag-n-drop-button" class="drag-n-drop-button">Drag 'n Drop</button>
  <button id="delete-links-button">Delete Links</button>
  <button id="confirm-delete-button" class="delete-button" style="display: none;">Confirm Delete</button>
  

</div>
</div>

<div class="top-right-container">
    <div class="weather-container">
        <div class="weather-search">
            <input type="text" id="locationInput" placeholder="Search city..." autocomplete="off">
            <button class="get-weather">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
        <div id="weatherInfo"></div>
    </div>
</div>

<div class="bottom-left-corner">

<button id="customization-button" class="custom-button">Customization ✨</button>
  
<div id="font-box-container" class="font-container hidden">
  
  <button id="bgButton" class="bg-button">Custom BG</button>
   <input type="file" id="fileInput" accept=".jpg, .jpeg, .png, .gif" style="display: none">
   <button id="custom-name-btn" class="custom-name-button">Custom Name</button>
   <button id="remove-bg-button" class="remove-bg-button">Remove BG</button>

   <button id="fontButton" class="custom-font-button">Custom Font</button>
   <button id="musicLibraryButton" class="music-library-button">Music Library</button>

 <div id="fontBox" class="box-container">
    <img src="images/svg/12.svg" class="font-option" data-font-family="new_york_extra_largeheavy">
    <img src="images/svg/12-2.svg" class="font-option" data-font-family="SF-Pro Rails">
    <img src="images/svg/12-1.svg" class="font-option" data-font-family="sf_pro_-_stencilregular">
    <img src="images/svg/12-3.svg" class="font-option" data-font-family="SFProDisplay-Heavy">
</div>

   <div class="input-container" id="input-container">
        <input type="text" id="name-input" placeholder="Enter your name">
  </div>
</div>
</div>

<div id="remove-bg-window" class="remove-bg-window">
  <div class="remove-bg-content">
    <div class="navbar">
      <p class="navbar-text">Remove Background Images</p>
      <button id="delete-bg-button" class="delete-button">Delete Selected</button>
      <button id="close-overlay" class="close-button">×</button>
    </div>

    <div class="image-grid"></div>

  </div>
</div>



<!-- Music Player Library Modal -->
<div id="music-player-modal" class="remove-bg-window">
  <div class="remove-bg-content">
    <div class="navbar">
      <p class="navbar-text">Music Library 🎵</p>
      <div style="display: flex; gap: 10px;">
        <button id="music-modal-select-folder" class="close-button" style="width: auto; padding: 0 15px;">Select Folder</button>
        <button id="music-modal-rescan" class="close-button" style="width: auto; padding: 0 15px; display: none;">Rescan</button>
        <button id="music-modal-shuffle" class="close-button" style="width: auto; padding: 0 15px;">Shuffle: Off</button>
        <button id="music-modal-repeat" class="close-button" style="width: auto; padding: 0 15px;">Repeat: Off</button>
      </div>
      <button id="close-music-player-modal" class="close-button">×</button>
    </div>

    <div class="music-modal-body" style="padding: 15px; color: white;">
      <div id="music-modal-status" style="margin-bottom: 15px; font-family: 'SFRounded-Semibold'; color: rgba(255,255,255,0.7);">
        No folder selected.
      </div>
      <div class="music-track-list" style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
        <!-- Track rows will be inserted here dynamically -->
      </div>
    </div>
  </div>
</div>

<div class="notes-box">
<button id="add-note-btn">Notes</button>
<div id="note-modal" class="modal">
<div class="modal-content">
  <span class="close-notes">&times;</span>
  <textarea id="note-textarea" placeholder="Type Something..."></textarea>
  <div id="notes-container" class="custom-scrollbar" id="notes-container"></div>
  <div class="modal-buttons">
    <button id="save-note-btn">Save Note</button>
    <button id="delete-note-btn">Delete Note</button>
    <button id="edit-note-btn">Edit Note</button>
    <!-- <button id="drag-note-btn">Drag Note</button> -->
  </div>
</div>
</div>
</div>


<!--JS Code Links-->
  <script src="js/time.js" defer></script>
  <script src="js/script.js"></script>
  <script src="js/bg.js"></script>
  <script src="js/date.js"></script>
  <script src="js/search.js"></script>
  <script src="js/note.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <script type="module" src="js/music.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/customization.js"></script>
  <script src="js/quote.js"></script>
  <script src="js/search-bar-text.js"></script>
  <script src="js/deleteLinks.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/pwa-service-worker.js')
          .then(reg => console.log('PWA Service Worker registered:', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
